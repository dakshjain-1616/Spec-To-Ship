<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPEC-TO-SHIP | Industrial Dashboard</title>
    <style>
        :root {
            --bg: #0d0f0e;
            --amber: #f5a623;
            --amber-dim: #8b5e14;
            --text: #e0e0e0;
            --border: #2a2d2b;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid var(--amber);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #stream {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .token-architect { color: #4a90e2; }
        .token-planner { color: #7ed321; }
        .token-engineer { color: var(--amber); }
        .token-qa { color: #50e3c2; }
        .token-reviewer { color: #d0021b; }
        
        .input-group {
            margin-bottom: 20px;
        }
        input, button {
            background: #1a1c1b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            font-family: inherit;
        }
        button {
            cursor: pointer;
            background: var(--amber-dim);
            color: #000;
            font-weight: bold;
        }
        button:hover { background: var(--amber); }

        /* Success Overlay */
        #success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 15, 14, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 4px solid var(--amber);
            box-shadow: 0 0 20px var(--amber-dim);
        }
        .success-content {
            background: #1a1c1b;
            padding: 40px;
            border: 1px solid var(--amber);
            text-align: center;
            max-width: 600px;
        }
        .success-content h2 {
            color: var(--amber);
            text-transform: uppercase;
            margin-top: 0;
        }
        .metric-box {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border: 1px dashed var(--amber-dim);
        }
        .metric {
            display: flex;
            flex-direction: column;
        }
        .metric-label { font-size: 10px; color: var(--amber-dim); }
        .metric-value { font-size: 20px; color: var(--text); font-weight: bold; }
        .path-display {
            background: #000;
            padding: 10px;
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            background: var(--amber);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .cta-button:hover { background: #fff; }
    </style>
</head>
<body>
    <div id="success-overlay">
        <div class="success-content">
            <h2>Pipeline Completed Successfully</h2>
            <div class="metric-box">
                <div class="metric">
                    <span class="metric-label">SCORE</span>
                    <span id="final-score" class="metric-value">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">TOKENS</span>
                    <span id="final-tokens" class="metric-value">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">STATUS</span>
                    <span id="final-status" class="metric-value">--</span>
                </div>
            </div>
            <div class="path-display">
                LOCATION: <span id="output-path">/root/SpecShip/output/</span>
            </div>
            <a id="download-link" class="cta-button">Download Artifacts (.zip)</a>
            <button onclick="document.getElementById('success-overlay').style.display='none'" style="margin-top: 20px; background: none; color: #555; border: none; text-decoration: underline;">Close Overlay</button>
        </div>
    </div>
    <div id="sidebar">
        <h3>PIPELINE HISTORY</h3>
        <div id="history-list"></div>
    </div>
    <div id="main">
        <div class="header">
            <h1>SPEC-TO-SHIP // COMMAND_CENTER</h1>
            <div id="status-bar">IDLE</div>
        </div>
        <div class="input-group">
            <input type="text" id="idea-input" style="width: 70%" placeholder="Enter feature idea (e.g. Express Rate Limiter)...">
            <button onclick="startRun()">INITIATE_PIPELINE</button>
        </div>
        <div id="stream"></div>
    </div>

    <script>
        let currentEventSource = null;

        async function startRun() {
            const idea = document.getElementById('idea-input').value;
            const res = await fetch('/v1/runs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idea })
            });
            const { runId } = await res.json();
            connectStream(runId);
        }

        function connectStream(runId) {
            if (currentEventSource) currentEventSource.close();
            const streamDiv = document.getElementById('stream');
            streamDiv.innerHTML = '';
            
            currentEventSource = new EventSource(`/v1/runs/${runId}/stream`);
            currentEventSource.addEventListener('agent_stream', (e) => {
                const data = JSON.parse(e.data);
                const span = document.createElement('span');
                span.className = `token-${data.agent}`;
                span.textContent = data.token;
                streamDiv.appendChild(span);
                streamDiv.scrollTop = streamDiv.scrollHeight;
            });

            currentEventSource.addEventListener('pipeline_done', (e) => {
                const data = JSON.parse(e.data);
                document.getElementById('status-bar').textContent = 'COMPLETED';
                
                // Show Success Overlay
                document.getElementById('final-score').textContent = `${data.score}/100`;
                document.getElementById('final-tokens').textContent = data.totalTokens ? data.totalTokens.toLocaleString() : 'N/A';
                document.getElementById('final-status').textContent = data.approved ? 'APPROVED' : 'REJECTED';
                document.getElementById('output-path').textContent = `/root/SpecShip/output/${data.runId}`;
                document.getElementById('download-link').href = `/v1/runs/${data.runId}/download`;
                document.getElementById('success-overlay').style.display = 'flex';

                currentEventSource.close();
            });
        }
    </script>
</body>
</html>
